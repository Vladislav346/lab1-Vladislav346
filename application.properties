package com.example.lab1.controller;

import com.example.lab1.model.Equipment;
import com.example.lab1.model.Hall;
import org.springframework.http.ResponseEntity;
import org.springframework.web.bind.annotation.*;

@RestController
@RequestMapping("/halls")
public class HallController {

    private Hall stub() {
        return new Hall(1L, "Conference Hall Alpha", 120, 2);
    }

    @PostMapping
    public ResponseEntity<Hall> create() {
        return ResponseEntity.ok(stub());
    }

    @GetMapping
    public ResponseEntity<Hall> getAll() {
        return ResponseEntity.ok(stub());
    }

    @GetMapping("/{id}")
    public ResponseEntity<Hall> getById(@PathVariable Long id) {
        return ResponseEntity.ok(stub());
    }

    @PutMapping("/{id}")
    public ResponseEntity<Hall> update(@PathVariable Long id) {
        return ResponseEntity.ok(stub());
    }

    @DeleteMapping("/{id}")
    public ResponseEntity<String> delete(@PathVariable Long id) {
        return ResponseEntity.ok("Hall deleted");
    }

    @GetMapping("/building/{buildingId}")
    public ResponseEntity<Hall> getByBuilding(@PathVariable Long buildingId) {
        return ResponseEntity.ok(stub());
    }

    @PostMapping("/{id}/equipment/{equipmentId}")
    public ResponseEntity<Equipment> addEquipment(@PathVariable Long id, @PathVariable Long equipmentId) {
        Equipment equipment = new Equipment(equipmentId, "Projector", "Full HD projector for presentations");
        return ResponseEntity.ok(equipment);
    }

    @DeleteMapping("/{id}/equipment/{equipmentId}")
    public ResponseEntity<String> removeEquipment(@PathVariable Long id, @PathVariable Long equipmentId) {
        return ResponseEntity.ok("Equipment removed from hall");
    }
}
